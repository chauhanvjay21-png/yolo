services:
  - type: web
    name: yolo-websocket-api
    runtime: python
    repo: https://github.com/yourusername/your-repo
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
